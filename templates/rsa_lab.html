<!DOCTYPE html>
<html>
<head>
    <title>RSA Demo</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >
</head>

<body>

<div class="main-content">

    <h1>RSA Vulnerability Simulator</h1>

    <form method="POST">

        <textarea
            name="message"
            placeholder="Enter message..."
        ></textarea>

        <button type="submit">
            Encrypt Message
        </button>

    </form>

    {% if encrypted %}

    <div class="result">

        <h2>Encrypted Message</h2>

        <p>{{ encrypted }}</p>

        <h2>Vulnerability Analysis</h2>

        <p>
            Weak RSA exponent detected.
            Small exponent attacks may recover plaintext.
        </p>

    </div>

    {% endif %}

</div>

</body>
</html>
